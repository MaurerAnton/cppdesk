name: Detailed CI Matrix

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, macos-14, macos-13, windows-2022]
        build_type: [Debug, Release]
        compiler: [default]
        include:
          - os: ubuntu-24.04
            compiler: gcc-14
            build_type: Release
          - os: ubuntu-24.04
            compiler: clang-18
            build_type: Release
          - os: ubuntu-24.04
            compiler: gcc-14
            build_type: Debug
            sanitizers: ON
    runs-on: \${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup compiler
        if: matrix.compiler != 'default'
        run: |
          if [ "\${{ matrix.compiler }}" = "gcc-14" ]; then
            sudo apt-get install -y g++-14
            echo "CC=gcc-14" >> \$GITHUB_ENV
            echo "CXX=g++-14" >> \$GITHUB_ENV
          elif [ "\${{ matrix.compiler }}" = "clang-18" ]; then
            sudo apt-get install -y clang-18
            echo "CC=clang-18" >> \$GITHUB_ENV
            echo "CXX=clang++-18" >> \$GITHUB_ENV
          fi
      - name: Install dependencies
        run: bash scripts/install_deps_ci.sh
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=\${{ matrix.build_type }} -DBUILD_TESTS=ON \${{ matrix.sanitizers && '-DCMAKE_CXX_FLAGS="-fsanitize=address,undefined"' || '' }}
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: cd build && ctest --output-on-failure -j\$(nproc)
      - name: Upload build artifacts
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: cppdesk-\${{ matrix.os }}-\${{ matrix.compiler }}
          path: build/cppdesk_*
