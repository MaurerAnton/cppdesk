name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-all:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cppdesk-linux-x86_64
            cmake-args: -G Ninja
            packages: libgtk-3-dev libx11-dev libxfixes-dev libxrandr-dev libpulse-dev libssl-dev libsqlite3-dev
          - os: windows-latest
            artifact: cppdesk-windows-x86_64
            cmake-args: -G "Visual Studio 17 2022" -A x64
            packages: ""
          - os: macos-latest
            artifact: cppdesk-macos-x86_64
            cmake-args: -G Ninja
            packages: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install cmake ninja pkg-config openssl
      - name: Configure
        run: cmake -B build ${{ matrix.cmake-args }} -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Package
        run: |
          cd build
          if [ "${{ runner.os }}" = "Linux" ]; then
            cpack -G DEB && cpack -G RPM && cpack -G ZIP
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cpack -G NSIS && cpack -G ZIP
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cpack -G DMG && cpack -G ZIP
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/cppdesk-*

  create-release:
    needs: build-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cppdesk-linux-x86_64/cppdesk-*
            cppdesk-windows-x86_64/cppdesk-*
            cppdesk-macos-x86_64/cppdesk-*
          generate_release_notes: true
          draft: false
          prerelease: false
