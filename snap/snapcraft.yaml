name: cppdesk
version: '1.3.0'
summary: Cross-platform remote desktop (client + server)
description: |
  cppdesk is a C++ rewrite of RustDesk, providing secure remote desktop access
  across Windows, Linux, macOS, Android, and iOS with end-to-end encryption.

grade: stable
confinement: strict
base: core24

apps:
  cppdesk:
    command: usr/bin/cppdesk
    extensions: [gnome]
    plugs:
      - home
      - network
      - network-bind
      - audio-playback
      - audio-record
      - x11
      - wayland
      - opengl
      - screen-inhibit-control
      - desktop
      - desktop-legacy
      - unity7
      - removable-media
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET:$LD_LIBRARY_PATH

  cppdesk-server:
    command: usr/bin/cppdesk_server
    daemon: simple
    plugs:
      - network
      - network-bind
      - home
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET:$LD_LIBRARY_PATH

parts:
  cppdesk:
    plugin: cmake
    source: https://github.com/MaurerAnton/cppdesk.git
    source-type: git
    source-tag: master
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DBUILD_CLIENT=ON
      - -DBUILD_SERVER=ON
      - -DBUILD_CLI=ON
      - -DBUILD_TESTS=OFF
      - -DENABLE_ENCRYPTION=ON
    build-packages:
      - build-essential
      - cmake
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - libx11-dev
      - libxfixes-dev
      - libxrandr-dev
      - libpulse-dev
      - libssl-dev
      - libsqlite3-dev
      - libglib2.0-dev
    stage-packages:
      - libgtk-3-0
      - libx11-6
      - libxfixes3
      - libxrandr2
      - libpulse0
      - libssl3
      - libsqlite3-0
      - libglib2.0-0
